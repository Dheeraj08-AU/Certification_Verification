<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GCET Certificate Verification</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{font-family:'Georgia',Times,serif;background:#eef2f7;padding:20px}
.card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.15);margin:15px auto;max-width:1100px; font-family:Arial, sans-serif;}
input{width:100%;padding:10px;margin:8px 0;box-sizing:border-box;border:1px solid #ccc;border-radius:6px;}
button{padding:10px 16px;margin:5px;background:#173f7a;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:bold;transition:background 0.2s;}
button:hover{background:#11305c}

.btn-danger{background:#b91c1c;}
.btn-danger:hover{background:#991b1b;}
.btn-secondary{background:#64748b;}
.btn-secondary:hover{background:#475569;}

.valid{color:#15803d;font-weight:bold;background:#bbf7d0;padding:4px 12px;border-radius:12px;} 
.invalid{color:#b91c1c;font-weight:bold;background:#fecaca;padding:4px 12px;border-radius:12px;}

/* Table Styling for Registry */
table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; text-align: left; }
th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
th { background-color: #f8fafc; color: #334155; font-weight: bold; }
tr:hover { background-color: #f1f5f9; }

/* Enhanced Creative Certificate Styling */
.certificate-container { position: relative; max-width: 950px; margin: 30px auto; padding: 10px; background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
.certificate{ background:#faf8f5; background-image: radial-gradient(#dfd7ca 1px, transparent 0), radial-gradient(#dfd7ca 1px, transparent 0); background-size: 24px 24px; background-position: 0 0, 12px 12px; border: 14px double #d4af37; padding: 50px; text-align: center; position: relative; box-sizing: border-box; overflow: hidden; }
.logo{max-width:320px;width:100%;margin-bottom:10px;position:relative;z-index:2;}
.cert-title {font-family:'Georgia',Times,serif; font-size:42px; font-weight:bold; color:#173f7a; margin:10px 0; letter-spacing:2px;}
.cert-subtitle {font-size:18px; font-style:italic; color:#666; margin-bottom:25px;}
.student{font-family:'Georgia',Times,serif; font-size:38px;font-weight:bold;margin:15px 0;color:#222;border-bottom:2px solid #d4af37;display:inline-block;padding:0 30px;}
.cert-presentation {font-size:16px; color:#555; font-style:italic;}
.course{font-family:Arial,sans-serif; font-size:26px;color:#173f7a;font-weight:bold;margin:15px 0;}
.cert-meta {font-size:15px; color:#444; margin:20px 0;}

.footer{display:flex;justify-content:space-between;align-items:flex-end;margin-top:50px;position:relative;z-index:2;}
.signature-section {text-align:center; width:220px;}
.signature-line{width:100%;border-top:2px dashed #777;margin-bottom:8px;}
.signature-title {font-size:14px; color:#555; font-weight:bold;}

.qrcode-section {text-align:right;}
#qrcode {display:inline-block; margin-top:5px; padding:5px; background:#fff; border:1px solid #ddd;}
.cert-id-text {font-size:12px; color:#777; font-family:monospace; margin-bottom:5px;}

.corner{position:absolute;width:60px;height:60px;z-index:1;}
.tl{top:15px;left:15px;border-top:5px solid #173f7a;border-left:5px solid #173f7a}
.tr{top:15px;right:15px;border-top:5px solid #173f7a;border-right:5px solid #173f7a}
.bl{bottom:15px;left:15px;border-bottom:5px solid #173f7a;border-left:5px solid #173f7a}
.br{bottom:15px;right:15px;border-bottom:5px solid #173f7a;border-right:5px solid #173f7a}

.watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-30deg);font-size:110px;color:rgba(23,63,122,0.04);font-weight:bold;white-space:nowrap;pointer-events:none;z-index:1;font-family:Arial,sans-serif;}
.gold-seal{ position:absolute; right:70px; top:40px; width:90px; height:90px; border-radius:50%; background: linear-gradient(135deg, #ffe066 0%, #d4af37 50%, #aa8513 100%); border:3px dashed #fff; box-shadow: 0 0 0 4px #d4af37, 0 4px 10px rgba(0,0,0,0.15); display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:11px; color:#fff; text-shadow:1px 1px 2px rgba(0,0,0,0.5); text-align:center; line-height:1.2; transform: rotate(-15deg); z-index:2; }
</style>
</head>
<body>

<div class="card">
<h1>GCET Blockchain Certificate System</h1>
<button id="connectBtn" onclick="connectWallet()">Connect MetaMask</button>
<button id="disconnectBtn" class="btn-secondary" onclick="disconnectWallet()" style="display:none;">Disconnect Session</button>
<div id="walletStatus" style="margin-top:10px; font-weight:bold; color:#444;">Wallet Not Connected</div>
</div>

<div class="card">
<h2>Issue Certificate <span style="font-size:14px; font-weight:normal; color:#666;">(Admin Only)</span></h2>
<input id="studentName" placeholder="Student Name">
<input id="courseName" placeholder="Course Name">
<input id="issueDate" placeholder="Issue Date (e.g., June 5, 2026)">
<input id="certificateId" placeholder="Certificate ID">
<button onclick="issueCertificate()">Issue Certificate</button>
</div>

<div class="card">
<h2>Revoke Certificate <span style="font-size:14px; font-weight:normal; color:#666;">(Admin Only)</span></h2>
<input id="revokeId" placeholder="Enter Certificate ID to Revoke">
<button class="btn-danger" onclick="revokeCertificate()">Revoke Certificate</button>
</div>

<div class="card">
<h2>Verify Certificate <span style="font-size:14px; font-weight:normal; color:#666;">(Public)</span></h2>
<input id="verifyId" placeholder="Certificate ID">
<button onclick="verifyCertificate()">Verify & Generate</button>
<button onclick="downloadPDF()">Download PDF</button>
<div id="result"></div>
</div>

<div class="card">
<h2>All Issued Certificates Registry</h2>
<button onclick="loadAllCertificates()">Fetch All Certificates from Registry</button>
<div id="allCertsTableContainer"></div>
</div>

// Updated Contract Details
const contractAddress = "0x8be44Ed948E13B3b0fa831256F4a30a4C9F4827E";
const abi = [

let provider, signer, contract;

async function connectWallet(){
 try {
   if (typeof window.ethereum !== 'undefined') {
     const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
     provider = new ethers.providers.Web3Provider(window.ethereum);
     signer = provider.getSigner();
     contract = new ethers.Contract(contractAddress, abi, signer);
     
     document.getElementById("walletStatus").innerHTML = "✅ Connected: " + accounts[0];
     document.getElementById("walletStatus").style.color = "#15803d";
     document.getElementById("connectBtn").style.display = "none";
     document.getElementById("disconnectBtn").style.display = "inline-block";
   } else {
     document.getElementById("walletStatus").innerHTML = "❌ MetaMask Not Detected";
     alert("MetaMask extension is missing.");
   }
 } catch(e) {
   alert("Wallet connection failed: " + e.message);
 }
}

function disconnectWallet() {
  provider = null; signer = null; contract = null;
  document.getElementById("walletStatus").innerHTML = "Wallet Session Disconnected";
  document.getElementById("walletStatus").style.color = "#444";
  document.getElementById("connectBtn").style.display = "inline-block";
  document.getElementById("disconnectBtn").style.display = "none";
  alert("Session cleared.");
}

function checkConnection() {
    if (!contract) { alert("Please connect your wallet first!"); return false; }
    return true;
}

async function issueCertificate(){
 if (!checkConnection()) return;
 const sName = document.getElementById("studentName").value;
 const cName = document.getElementById("courseName").value;
 const iDate = document.getElementById("issueDate").value;
 const cId = document.getElementById("certificateId").value;
 
 if(!sName || !cName || !iDate || !cId) { alert("All fields are mandatory."); return; }

 try {
   const tx = await contract.issueCertificate(sName, cName, iDate, cId);
   await tx.wait(); 
   alert("✅ Certificate Successfully Issued!");
 } catch(e) { 
   alert("Transaction failed. Only the contract owner can issue."); 
   console.error(e); 
 }
}

async function revokeCertificate(){
 if (!checkConnection()) return;
 const id = document.getElementById("revokeId").value;
 if(!id) { alert("Please enter an ID."); return; }
 if(!confirm("Revoke certificate permanently?")) return;

 try {
   const tx = await contract.revokeCertificate(id);
   await tx.wait(); 
   alert("🚨 Certificate Revoked!");
 } catch(e) { 
   alert("Transaction failed. Only the contract owner can revoke."); 
   console.error(e); 
 }
}

async function verifyCertificate(){
 const id = document.getElementById("verifyId").value;
 if(!id) { alert("Please enter a Certificate ID"); return; }
 try {
   let readContract = contract;
   if(!contract && typeof window.ethereum !== 'undefined') {
       const tempProvider = new ethers.providers.Web3Provider(window.ethereum);
       readContract = new ethers.Contract(contractAddress, abi, tempProvider);
   } else if (!contract) { alert("Connect MetaMask to read data."); return; }

   const d = await readContract.verifyCertificate(id);
   if(d.studentName === "") { alert("Certificate ID not found."); return; }

       <div class="corner bl" style="border-color: ${d.isValid ? '#173f7a' : '#b91c1c'}"></div>
       <div class="corner br" style="border-color: ${d.isValid ? '#173f7a' : '#b91c1c'}"></div>

async function loadAllCertificates() {
 try {
   let readContract = contract;
   if(!contract && typeof window.ethereum !== 'undefined') {
       const tempProvider = new ethers.providers.Web3Provider(window.ethereum);
       readContract = new ethers.Contract(contractAddress, abi, tempProvider);
   } else if (!contract) {
       alert("Please connect MetaMask to fetch contract data.");
       return;
   }

   const container = document.getElementById("allCertsTableContainer");
   container.innerHTML = "<em>Loading data from blockchain registry...</em>";

   const list = await readContract.getAllCertificates();

   if(list.length === 0) {
       container.innerHTML = "<p>No certificates have been issued yet.</p>";
       return;
   }

   let tableHtml = `
   <table>
     <thead>
       <tr>
         <th>Certificate ID</th>
         <th>Student Name</th>
         <th>Course Name</th>
         <th>Issue Date</th>
         <th>Status</th>
       </tr>
     </thead>
     <tbody>
   `;

   for (let i = 0; i < list.length; i++) {
       const cert = list[i];
       const statusBadge = cert.isValid 
           ? `<span class="valid" style="font-size:11px; padding:2px 8px;">VALID</span>` 
           : `<span class="invalid" style="font-size:11px; padding:2px 8px;">REVOKED</span>`;
       
       tableHtml += `
       <tr>
         <td style="font-family:monospace; font-weight:bold;">${cert.certificateId}</td>
         <td>${cert.studentName}</td>
         <td>${cert.courseName}</td>
         <td>${cert.issueDate}</td>
         <td>${statusBadge}</td>
       </tr>
       `;
   }

   tableHtml += `</tbody></table>`;
   container.innerHTML = tableHtml;

 } catch (e) {
   alert("Failed to load certificates registry.");
   console.error(e);
 }
}

async function downloadPDF(){
 const el = document.getElementById("certificateArea");
 if(!el) { alert("Please verify a certificate first."); return; }
 try {
   const canvas = await html2canvas(el, {scale: 2}); 
   const img = canvas.toDataURL("image/png");
   const {jsPDF} = window.jspdf;
   const pdf = new jsPDF("landscape","mm","a4");
   pdf.addImage(img,"PNG",10,10,277,190);
   pdf.save(`GCET_Certificate_${document.getElementById("verifyId").value}.pdf`);
 } catch(e) { alert("PDF generation failed."); console.error(e); }
}
